version: '3.9'

services:
  # MongoDB Database
  mongo:
    image: mongo:8.0
    container_name: movies-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: movies
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - movies-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Movies Service (gRPC)
  movies-service:
    build:
      context: .
      dockerfile: movies-service/Dockerfile
    container_name: movies-service
    ports:
      - "50051:50051"
    environment:
      MONGO_URI: mongodb://root:password@mongo:27017/movies?authSource=admin
      GRPC_PORT: "50051"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - movies-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      GRPC_SERVER_URL: movies-service:50051
      HTTP_PORT: "8080"
    depends_on:
      movies-service:
        condition: service_started
    networks:
      - movies-network
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

networks:
  movies-network:
    driver: bridge
